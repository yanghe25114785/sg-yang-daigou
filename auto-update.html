<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>代购后台（自动提交GitHub版）</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: auto; }
    input, button { width: 100%; margin: 6px 0; padding: 10px; }
    .card { border: 1px solid #ccc; padding: 10px; margin-top: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<h2>商品后台（全自动提交 GitHub 🚀）</h2>

<input id="name" placeholder="商品名">
<input id="series" placeholder="系列">
<input id="character" placeholder="角色">
<input id="shop" placeholder="店铺">
<input id="cost" placeholder="成本价">
<input id="sell" placeholder="售价">
<input id="image" placeholder="图片链接">

<button onclick="addProduct()">添加商品</button>
<button onclick="pushToGitHub()">一键提交到网站（自动更新）</button>

<div id="preview"></div>

<script>
let products = [];

// ⚠️ 这里填你的信息（必须改！）
const GITHUB_TOKEN = "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"; // GitHub Token
const REPO = "yanghe25114785/sg-yang-daigou";
const FILE_PATH = "data.json";

function addProduct() {
  const product = {
    name: document.getElementById("name").value,
    series: document.getElementById("series").value,
    character: document.getElementById("character").value,
    shop: document.getElementById("shop").value,
    cost_price: Number(document.getElementById("cost").value),
    sell_price: Number(document.getElementById("sell").value),
    image: document.getElementById("image").value,
    status: "在售"
  };

  products.push(product);
  render();
  clearInputs();
}

function render() {
  const container = document.getElementById("preview");
  container.innerHTML = "";

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${p.image}" width="100"><br>
      <b>${p.name}</b><br>
      ${p.series} / ${p.character}<br>
      💰 $${p.sell_price}
    `;
    container.appendChild(div);
  });
}

function clearInputs() {
  document.querySelectorAll("input").forEach(i => i.value = "");
}

// 🚀 自动提交到 GitHub
async function pushToGitHub() {
  if (!GITHUB_TOKEN || GITHUB_TOKEN === "YOUR_GITHUB_TOKEN") {
    alert("请先填写 GitHub Token！");
    return;
  }

  const url = `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;

  // 先获取原文件 sha
  const getRes = await fetch(url, {
    headers: {
      Authorization: `token ${GITHUB_TOKEN}`
    }
  });

  let sha = null;
  if (getRes.ok) {
    const fileData = await getRes.json();
    sha = fileData.sha;
  }

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));

  const res = await fetch(url, {
    method: "PUT",
    headers: {
      Authorization: `token ${GITHUB_TOKEN}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "update products",
      content: content,
      sha: sha
    })
  });

  if (res.ok) {
    alert("✅ 上传成功！网站已自动更新！");
  } else {
    const err = await res.json();
    alert("❌ 上传失败: " + JSON.stringify(err));
  }
}
</script>

</body>
</html>
