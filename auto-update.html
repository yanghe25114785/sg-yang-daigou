<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>代购后台（自动提交GitHub版）</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: auto; }
    input, button { width: 100%; margin: 6px 0; padding: 10px; }
    .card { border: 1px solid #ccc; padding: 10px; margin-top: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<h2>商品后台（全自动提交 GitHub 🚀）</h2>

<input id="name" placeholder="商品名">
<input id="series" placeholder="系列">
<input id="character" placeholder="角色">
<input id="shop" placeholder="店铺">
<input id="cost" placeholder="成本价">
<input id="sell" placeholder="售价">
<input id="image" placeholder="图片链接">

<button onclick="addProduct()">添加商品</button>
<button onclick="pushToGitHub()">一键提交到网站（自动更新）</button>

<div id="preview"></div>

<script>
let products = [];

function addProduct() {
  const product = {
    name: document.getElementById("name").value,
    series: document.getElementById("series").value,
    character: document.getElementById("character").value,
    shop: document.getElementById("shop").value,
    cost_price: Number(document.getElementById("cost").value),
    sell_price: Number(document.getElementById("sell").value),
    image: document.getElementById("image").value,
    status: "在售"
  };

  products.push(product);
  render();
  clearInputs();
}

function render() {
  const container = document.getElementById("preview");
  container.innerHTML = "";

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${p.image}" width="100"><br>
      <b>${p.name}</b><br>
      ${p.series} / ${p.character}<br>
      💰 $${p.sell_price}
    `;
    container.appendChild(div);
  });
}

function clearInputs() {
  document.querySelectorAll("input").forEach(i => i.value = "");
}

// 🚀 新版本：通过后端接口上传
async function pushToGitHub() {
  const res = await fetch("https://daigou-backend.yanghe25114785.workers.dev", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(products)
  });

  if (res.ok) {
    alert("✅ 上传成功！已同步到GitHub");
  } else {
    const err = await res.text();
    alert("❌ 上传失败: " + err);
  }
}
</script>

</body>
</html>
