backend:
  name: github
  repo: 你的用户名/sg-daigou
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "goods"
    label: "商品"
    folder: "data/goods"
    create: true
    slug: "{{id}}"
    fields:
      - { name: "id", label: "编号", widget: "string" }
      - { name: "name", label: "商品名称", widget: "string" }
      - { name: "series", label: "系列", widget: "string" }
      - { name: "character", label: "角色", widget: "string" }
      - { name: "shop", label: "店铺", widget: "string" }
      - { name: "images", label: "图片", widget: "list" }
      - { name: "costPrice", label: "本金", widget: "number" }
      - { name: "servicePrice", label: "代购费", widget: "number" }
      - { name: "inStock", label: "库存", widget: "boolean" }
      - { name: "desc", label: "描述", widget: "text" }
      - { name: "addedDate", label: "上架日期", widget: "datetime" }

